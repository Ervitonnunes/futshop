<!DOCTYPE html>
<html>
<head>
<title>Painel FutShop</title>
<style>

body{
font-family:Arial;
padding:40px;
background:#f4f4f4;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:black;
color:white;
border:none;
}

</style>
</head>

<body>

<h1>Painel FutShop</h1>

<div class="box">

<input id="nome" placeholder="Nome da camisa">
<input id="preco" placeholder="Preço">
<input id="imagem" placeholder="URL da imagem">

<button onclick="addProduto()">Adicionar Produto</button>

</div>

<script>

function addProduto(){

let nome=document.getElementById("nome").value
let preco=document.getElementById("preco").value
let imagem=document.getElementById("imagem").value

let produtos=JSON.parse(localStorage.getItem("produtos")) || []

produtos.push({
nome:nome,
preco:parseFloat(preco),
imagem:imagem,
estoque:{P:5,M:5,G:5,GG:5,XGG:5}
})

localStorage.setItem("produtos",JSON.stringify(produtos))

alert("Produto adicionado!")

}

</script>

</body>
</html>
